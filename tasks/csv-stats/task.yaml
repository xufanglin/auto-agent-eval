name: csv-stats
prompt: |
  There is a bug in stats.py: it crashes when the CSV has empty cells
  or non-numeric values. Fix it so that:
  1. Non-numeric columns (like 'name', 'city') are skipped entirely
  2. Empty cells and non-numeric values within numeric columns are skipped
  3. Stats are calculated only from valid numeric values
  Only modify stats.py. Run `python test_stats.py` to verify.
metadata:
  source: custom
  difficulty: easy
  category: data
