evaluator:
  type: code
  checks:
    - name: "script does not crash"
      type: command
      cmd: "python stats.py test_data.csv"
      expect_exit: 0

    - name: "all tests pass"
      type: command
      cmd: "python test_stats.py"
      expect_exit: 0

    - name: "output is valid JSON"
      type: python
      script: |
        import subprocess, sys, json
        r = subprocess.run([sys.executable, 'stats.py', 'test_data.csv'],
            capture_output=True, text=True, cwd=str(workspace))
        try:
            json.loads(r.stdout)
            score, reason = 1.0, 'Valid JSON'
        except:
            score, reason = 0.0, 'Invalid JSON'
