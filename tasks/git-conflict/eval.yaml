evaluator:
  type: composite
  evaluators:
    - type: code
      weight: 0.7
      checks:
        - name: "no conflict markers"
          type: python
          script: |
            text = (workspace / 'auth.py').read_text()
            has_markers = '<<<<<<<' in text or '=======' in text or '>>>>>>>' in text
            score = 0.0 if has_markers else 1.0
            reason = "Conflict markers still present" if has_markers else "No conflict markers"

        - name: "all tests pass"
          type: command
          cmd: "python test_auth.py"
          expect_exit: 0

        - name: "uses relaxed policy (MIN_PASSWORD_LENGTH=8)"
          type: python
          script: |
            import importlib.util
            spec = importlib.util.spec_from_file_location("auth", workspace / "auth.py")
            mod = importlib.util.module_from_spec(spec); spec.loader.exec_module(mod)
            score = 1.0 if mod.MIN_PASSWORD_LENGTH == 8 else 0.0
            reason = f"MIN_PASSWORD_LENGTH = {mod.MIN_PASSWORD_LENGTH}, expected 8"

        - name: "uses relaxed policy (MAX_LOGIN_ATTEMPTS=5)"
          type: python
          script: |
            import importlib.util
            spec = importlib.util.spec_from_file_location("auth", workspace / "auth.py")
            mod = importlib.util.module_from_spec(spec); spec.loader.exec_module(mod)
            score = 1.0 if mod.MAX_LOGIN_ATTEMPTS == 5 else 0.0
            reason = f"MAX_LOGIN_ATTEMPTS = {mod.MAX_LOGIN_ATTEMPTS}, expected 5"

        - name: "no special char requirement"
          type: python
          script: |
            import importlib.util
            spec = importlib.util.spec_from_file_location("auth", workspace / "auth.py")
            mod = importlib.util.module_from_spec(spec); spec.loader.exec_module(mod)
            valid, _ = mod.validate_password("Abcdefgh1")  # 9 chars, no special char
            score = 1.0 if valid else 0.0
            reason = "No special char required (feature branch policy)" if valid else "Special char still required"

    - type: llm_judge
      weight: 0.3
      model: claude
      rubric:
        correctness: "Is the correct branch's policy (feature/relax-password-policy) consistently applied across all constants and logic?"
