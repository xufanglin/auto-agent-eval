name: django-11099
prompt: |
  There is a bug in validators.py: the URLValidator rejects valid
  IPv6 URLs like http://[::ffff:127.0.0.1]/.
  Fix the URLValidator so it accepts URLs with bracketed IPv6 addresses
  (e.g. http://[2001:db8::1]:8080/path) while still rejecting invalid URLs.
  Only modify validators.py.
  Run `python test_url.py` to verify your fix — all tests must pass.
