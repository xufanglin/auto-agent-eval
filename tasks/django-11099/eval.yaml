evaluator:
  type: composite
  evaluators:
    - type: code
      weight: 1.0
      checks:
        - name: "validators.py was modified"
          type: python
          script: |
            import filecmp
            orig = workspace / '.originals' / 'validators.py'
            current = workspace / 'validators.py'
            if orig.exists() and current.exists():
                score = 0.0 if filecmp.cmp(orig, current) else 1.0
                reason = 'File was modified' if score else 'File unchanged'
            else:
                score, reason = 0.0, 'File not found'

        - name: "all tests pass"
          type: command
          cmd: "python3 test_url.py"
          expect_exit: 0

        - name: "IPv6 URL accepted"
          type: command
          cmd: "python3 -c \"import sys; sys.path.insert(0,'.'); from validators import URLValidator, ValidationError; v=URLValidator(); v('http://[::ffff:127.0.0.1]/')\""
          expect_exit: 0

        - name: "invalid URLs still rejected"
          type: command
          cmd: "python3 -c \"import sys; sys.path.insert(0,'.'); from validators import URLValidator, ValidationError; v=URLValidator(); v('not-a-url')\""
          expect_exit: 1
