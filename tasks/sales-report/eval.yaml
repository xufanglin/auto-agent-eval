evaluator:
  type: composite
  evaluators:
    - type: code
      weight: 0.4
      checks:
        - name: "report.md exists"
          type: file_exists
          path: report.md

        - name: "report has substance (>500 chars)"
          type: python
          script: |
            content = (workspace / 'report.md').read_text() if (workspace / 'report.md').exists() else ''
            score = 1.0 if len(content) > 500 else 0.0
            reason = f'Report length: {len(content)} chars'

        - name: "report contains actual revenue numbers"
          type: python
          script: |
            import re
            p = workspace / 'report.md'
            if p.exists():
                content = p.read_text()
                numbers = re.findall(r'\d[\d,]+', content)
                has_data = any(int(n.replace(',','')) > 1000 for n in numbers if n.replace(',','').isdigit())
                score = 1.0 if has_data else 0.0
                reason = f'Found {len(numbers)} numbers' if has_data else 'No revenue data found'
            else:
                score, reason = 0.0, 'report.md not found'

        - name: "report mentions all products"
          type: python
          script: |
            content = (workspace / 'report.md').read_text().lower() if (workspace / 'report.md').exists() else ''
            products = ['widget a', 'widget b', 'widget c']
            found = [p for p in products if p in content]
            score = len(found) / len(products)
            reason = f'Found {len(found)}/{len(products)} products'

    - type: llm_judge
      weight: 0.6
      model: claude
      rubric:
        accuracy: "Are the numbers and analysis factually correct based on the CSV data?"
        completeness: "Does it cover all 5 required sections (summary, trends, comparison, regional, recommendations)?"
        insight: "Are the recommendations actionable and data-driven?"
