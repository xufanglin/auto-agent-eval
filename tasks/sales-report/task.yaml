name: sales-report
prompt: |
  Analyze the sales data in sales_data.csv and create a Markdown report
  saved as report.md. The report must include:
  1. An executive summary with total revenue and top product
  2. Monthly revenue trend analysis
  3. Product comparison (which product performs best and why)
  4. Regional breakdown
  5. At least 3 actionable recommendations
  Use actual numbers from the data. Write the report to report.md.
metadata:
  source: custom
  difficulty: medium
  category: analysis
