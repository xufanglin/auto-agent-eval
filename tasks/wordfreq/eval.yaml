evaluator:
  type: code
  checks:
    - name: "wordfreq.py exists"
      type: file_exists
      path: wordfreq.py

    - name: "basic run works"
      type: command
      cmd: "python wordfreq.py sample.txt"
      expect_exit: 0

    - name: "'the' is most frequent word"
      type: python
      script: |
        import subprocess, sys
        r = subprocess.run([sys.executable, 'wordfreq.py', 'sample.txt'],
            capture_output=True, text=True, cwd=str(workspace))
        lines = r.stdout.strip().split('\n')
        score = 1.0 if lines and 'the' in lines[0].lower() else 0.0
        reason = f'First line: {lines[0]!r}' if lines else 'No output'

    - name: "--top flag works"
      type: python
      script: |
        import subprocess, sys
        r = subprocess.run(
            [sys.executable, 'wordfreq.py', 'sample.txt', '--top', '3'],
            capture_output=True, text=True, cwd=str(workspace))
        lines = [l for l in r.stdout.strip().split('\n') if l.strip()]
        score = 1.0 if len(lines) == 3 else 0.0
        reason = f'Got {len(lines)} lines, expected 3'

    - name: "--json flag works"
      type: python
      script: |
        import subprocess, sys, json
        r = subprocess.run(
            [sys.executable, 'wordfreq.py', 'sample.txt', '--json'],
            capture_output=True, text=True, cwd=str(workspace))
        try:
            data = json.loads(r.stdout)
            score = 1.0 if isinstance(data, (dict, list)) else 0.0
            reason = 'Valid JSON output'
        except:
            score, reason = 0.0, f'Invalid JSON: {r.stdout[:100]}'
