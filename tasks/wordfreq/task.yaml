name: wordfreq
prompt: |
  Build a Python CLI tool called wordfreq.py that:
  1. Takes a text file path as argument: `python wordfreq.py sample.txt`
  2. Counts word frequency (case-insensitive, strip punctuation)
  3. Outputs top 10 words in descending frequency as: 'word: count'
  4. Supports a --top N flag to change the number of results
  5. Supports a --json flag to output as JSON
  Create the file wordfreq.py from scratch.
metadata:
  source: custom
  difficulty: easy
  category: coding
