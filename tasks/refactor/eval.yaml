evaluator:
  type: composite
  evaluators:
    - type: code
      weight: 0.6
      checks:
        - name: "output unchanged (functional equivalence)"
          type: command
          cmd: "python test_processor.py"
          expect_exit: 0

        - name: "has type hints"
          type: python
          script: |
            content = (workspace / 'processor.py').read_text()
            score = 1.0 if '->' in content and ':' in content else 0.0
            reason = 'Type hints found' if score else 'No type hints'

        - name: "has docstrings"
          type: python
          script: |
            content = (workspace / 'processor.py').read_text()
            score = 1.0 if '"""' in content else 0.0
            reason = 'Docstrings found' if score else 'No docstrings'

        - name: "no single-letter variable names"
          type: python
          script: |
            import re
            content = (workspace / 'processor.py').read_text()
            bad = re.findall(r'\b([a-z])\s*=', content)
            bad = [v for v in bad if v not in ('i', 'f', 'e')]
            score = 1.0 if len(bad) == 0 else 0.0
            reason = f'Single-letter vars: {bad}' if bad else 'Clean names'

    - type: llm_judge
      weight: 0.4
      model: claude
      rubric:
        readability: "Is the refactored code significantly more readable than the original?"
        structure: "Is the logic well-organized with clear separation of concerns?"
