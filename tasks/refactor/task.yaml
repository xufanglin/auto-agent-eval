name: refactor
prompt: |
  Refactor processor.py to improve readability and maintainability:
  1. Use meaningful variable and function names
  2. Add type hints
  3. Extract the classification logic into clear, separate functions
  4. Add docstrings
  5. Keep the exact same output behavior
  Only modify processor.py. Run `python test_processor.py` to verify.
metadata:
  source: custom
  difficulty: medium
  category: refactoring
