name: Claude Code (default)
type: claude-code
config:
  timeout: 600
  isolation:
    settings_sources: "user"
    system_prompt: "You are a coding assistant. Complete the task. Do not ask questions."
    env_vars:
      - HOME
      - PATH
      - TMPDIR
      - ANTHROPIC_AUTH_TOKEN
      - ANTHROPIC_BASE_URL
      - ANTHROPIC_API_KEY
      - ANTHROPIC_MODEL
      - ANTHROPIC_DEFAULT_SONNET_MODEL
      - API_TIMEOUT_MS
      - CLAUDE_CODE_USE_BEDROCK
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
      - AWS_PROFILE
      - AWS_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
